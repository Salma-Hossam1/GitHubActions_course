name: First Workflow

on:
  push:
    branches:
      - main

jobs:
  example-job:
    runs-on: ubuntu-latest

    steps:
      - name: Print a Welcome message
        run: echo "Welcome to our first Github Actions Workflow!"

      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      - name: List repository files 
        run: ls -la
